<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>African Queen Empire</title>

<!-- Importation du Style 1 (Royal & Prestige) depuis Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    /* Application de la police épurée Poppins par défaut */
    font-family: 'Poppins', sans-serif;
    overflow:hidden;
    background-color: #000;
}

/* ================= FRONT PAGE / EN-TÊTE ================= */
.front-page{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTENEURS POUR LE FLOU ARRIÈRE-PLAN */
.bg-slider {
    position: absolute;
    inset: 0;
    z-index: 1;
}

.bg-slide {
    position: absolute;
    inset: 0;

    background-size: cover;
    background-position: center;

    transform: scale(1.05);
    filter: blur(10px);

    opacity: 0;

    transition: opacity 0.8s ease;

    will-change: opacity, transform;
    backface-visibility: hidden;
}

/* Couche sombre globale */
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:2;
}

/* ================= CONTENT BOX (CARTE BANNIÈRE) ================= */
.content-box{
    position:relative;
    width: 96vw;
    height: 92vh;
    border-radius: 24px; 
    overflow:hidden;
    z-index:3;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);

    display: flex;
    flex-direction: column;
    justify-content: flex-end; 
}

/* Slider interne (images nettes) */
.inner-slider {
    position: absolute;
    inset: 0;
    z-index: 1;
}

.inner-slide {
    position: absolute;
    inset: 0;

    background-size: cover;
    background-position: center;

    opacity: 0;

    transition: opacity 0.8s ease;

    will-change: opacity;
    backface-visibility: hidden;
}

/* États actifs */
.bg-slide.active { opacity: 0.5; }
.inner-slide.active { opacity: 1; }

/* Dégradé interne pour la lisibilité du texte */
.content-box::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 100%);
    z-index:2;
}

/* ================= HEADER BAR (LOGO + NAV) ================= */
.header-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 0 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
}

/* Style Écriture Logo (Playfair Display - Prestige Royal) */
.logo{
    display:flex;
    align-items:center;
}

.logo img{
    width:180px;
    height:auto;
    object-fit:contain;
    display:block;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
}

/* Style de la Navigation (Poppins - Moderne & Épurée) */
.main-nav-container a {
    color: white;
    text-decoration: none;
    margin-left: 35px;
    font-size: 0.95rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.75;
    transition: opacity 0.3s;
    display: inline-block;
}

.main-nav-container a:hover {
    color: rgb(255, 234, 0);
    opacity: 1;
}

/* ================= TEXTE CENTRAL ET DYNAMIQUE ================= */
.content{
    position:absolute;

    bottom:60px;

    z-index:3;

    color:white;

    width:600px;

    text-shadow:0 2px 4px rgba(0,0,0,0.6);

    transition:
        left 0.8s ease,
        right 0.8s ease;
}

/* POSITION LEFT */

.content.left{
    left:60px;
    right:auto;
    text-align:left;
}

/* POSITION RIGHT */

.content.right{
    right:60px;
    left:auto;
    text-align:right;
}

.content h1{
    /* Application du style signature : Playfair Display en Italique */
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 400;
    font-style: italic; 
    margin-bottom: 15px;
    line-height: 1.1;
    will-change: transform,opacity;
}

.content p {
    font-family: 'Poppins', sans-serif;
    font-size: 1.1rem;
    font-weight: 300;
    max-width: 600px;
    line-height: 1.8;
    opacity: 0.85;
    letter-spacing: 0.5px;
    will-change: transform,opacity;

}

/* ==================================================
   RESPONSIVE DESIGN (Adaptation Mobile & Tablette)
   ================================================== */

@media (max-width: 992px) {
    .header-bar {
        padding: 0 40px;
    }
    .content h1 {
        font-size: 3.5rem;
    }
}

@media (max-width: 768px) {
    .header-bar {
        top: 25px;
        flex-direction: column;
        gap: 15px;
        padding: 0 20px;
    }

    .logo {
        font-size: 1.3rem;
        letter-spacing: 1px;
    }

    .main-nav-container a {
        margin: 0 10px;
        font-size: 0.85rem;
        letter-spacing: 1px;
    }

    .content {
        padding: 0 24px 40px 24px;
    }

    .content h1 {
        font-size: 2.4rem;
        transition: all 0.6s ease;
    }

    .content p {
        font-size: 0.95rem;
        transition: all 0.6s ease;
    }
}
/* =========================
   TEXT ANIMATIONS
========================= */

.content h1,
.content p{
    opacity:0;
}

/* FROM LEFT */
.animate-left h1,
.animate-left p{
    animation:fromLeft 1s ease forwards;
}

.animate-left p{
    animation-delay:0.2s;
}

/* FROM RIGHT */
.animate-right h1,
.animate-right p{
    animation:fromRight 1s ease forwards;
}

.animate-right p{
    animation-delay:0.2s;
}

/* FROM BOTTOM RIGHT */
.animate-bottom-right h1,
.animate-bottom-right p{
    animation:fromBottomRight 1s ease forwards;
}

.animate-bottom-right p{
    animation-delay:0.2s;
}

/* FROM BOTTOM LEFT */
.animate-bottom-left h1,
.animate-bottom-left p{
    animation:fromBottomLeft 1s ease forwards;
}

.animate-bottom-left p{
    animation-delay:0.2s;
}

/* KEYFRAMES */

@keyframes fromLeft{
    from{
        opacity:0;
        transform:translateX(-120px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes fromRight{
    from{
        opacity:0;
        transform:translateX(120px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes fromBottomRight{
    from{
        opacity:0;
        transform:
            translate(120px,120px);
    }

    to{
        opacity:1;
        transform:
            translate(0,0);
    }
}

@keyframes fromBottomLeft{
    from{
        opacity:0;
        transform:
            translate(-120px,120px);
    }

    to{
        opacity:1;
        transform:
            translate(0,0);
    }
}
/* =========================
   ANIMATION TEXT
========================= */

.content h1,
.content p{
    opacity:0;
}

/* LEFT SIDE */

.animate-left h1,
.animate-left p{
    animation:slideFromLeft 1s ease forwards;
}

.animate-left p{
    animation-delay:0.2s;
}

/* RIGHT SIDE */

.animate-right h1,
.animate-right p{
    animation:slideFromRight 1s ease forwards;
}

.animate-right p{
    animation-delay:0.2s;
}

/* KEYFRAMES */

@keyframes slideFromLeft{

    from{
        opacity:0;
        transform:translateX(-120px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }
}

@keyframes slideFromRight{

    from{
        opacity:0;
        transform:translateX(120px);
    }

    to{
        opacity:1;
        transform:translateX(0);
    }
}
/* =========================
   BOTTOM ANIMATIONS
========================= */

.animate-bottom-right h1,
.animate-bottom-right p{
    animation:bottomRightUp 1s ease forwards;
}

.animate-bottom-right p{
    animation-delay:0.2s;
}

.animate-bottom-left h1,
.animate-bottom-left p{
    animation:bottomLeftUp 1s ease forwards;
}

.animate-bottom-left p{
    animation-delay:0.2s;
}

/* KEYFRAMES */

@keyframes bottomRightUp{

    from{
        opacity:0;
        transform:
            translateY(120px);
    }

    to{
        opacity:1;
        transform:
            translateY(0);
    }
}

@keyframes bottomLeftUp{

    from{
        opacity:0;
        transform:
            translateY(120px);
    }

    to{
        opacity:1;
        transform:
            translateY(0);
    }
}
</style>
</head>
<body>

<section class="front-page">

    <!-- Slider d'arrière-plan (flou) -->
    <div class="bg-slider" id="bgSlider"></div>

    <!-- Overlay de protection -->
    <div class="overlay"></div>

    <!-- Grande Carte En-tête -->
    <div class="content-box">
        
        <!-- Barre d'en-tête (Logo en haut à gauche, Nav à droite) -->
        <div class="header-bar">
            <div class="logo">
                <img src="logo.png" alt="African Queen Empire Logo">
            </div>
            
            <div class="main-nav-container">
                <a href="#">Services</a>
                <a href="#">Shop</a>
                <a href="#">About Us</a>
                <a href="#">Contact</a>
            </div>
        </div>
        
        <!-- Slider central (net) -->
        <div class="inner-slider" id="innerSlider"></div>

        <!-- Texte dynamique -->
        <div class="content right animate-right" id="animatedContent">
            <h1 id="sliderTitle">African Queen</h1>
            <p id="sliderText">Handmade Creativity</p>
        </div>
    </div>

</section>

<script>
const slidesData = [
    {
        image: "https://images.pexels.com/photos/20164064/pexels-photo-20164064.jpeg?auto=compress&cs=tinysrgb&w=1600",
        title: "Handmade Creativity",
        text: "Unique African crafts made with passion and precision."
    },
    {
        image: "https://images.pexels.com/photos/6775667/pexels-photo-6775667.jpeg?auto=compress&cs=tinysrgb&w=1600",
        title: "Interior Decoration",
        text: "Bring warmth and African elegance into your living spaces."
    },
    {
        image: "https://images.pexels.com/photos/162886/coffee-glass-beverage-coffee-mug-162886.jpeg?auto=compress&cs=tinysrgb&w=1600",
        title: "Café Lifestyle",
        text: "Relax and enjoy an authentic cultural coffee experience."
    },
    {
        image: "https://images.pexels.com/photos/20167932/pexels-photo-20167932.jpeg?auto=compress&cs=tinysrgb&w=1600",
        title: "Fashion Products",
        text: "Bold designs and premium African textiles just for you."
    }
];

const bgSlider = document.getElementById("bgSlider");
const innerSlider = document.getElementById("innerSlider");
const sliderTitle = document.getElementById("sliderTitle");
const sliderText = document.getElementById("sliderText");

let currentIndex = 0;

const bgSlidesElements = [];
const innerSlidesElements = [];

/* =========================
   PRELOAD DES IMAGES
========================= */

function preloadImages() {

    let loaded = 0;

    slidesData.forEach((slide, i) => {

        const img = new Image();

        img.src = slide.image;

        img.onload = () => {

            loaded++;

            if (loaded === slidesData.length) {
                createSlides();
                startSlider();
            }
        };
    });
}

/* =========================
   CREATION DES SLIDES
========================= */

function createSlides() {

    slidesData.forEach((slide, i) => {

        const bgDiv = document.createElement("div");

        bgDiv.className = "bg-slide";

        if(i === 0){
            bgDiv.classList.add("active");
        }

        bgDiv.style.backgroundImage = `url('${slide.image}')`;

        bgSlider.appendChild(bgDiv);

        bgSlidesElements.push(bgDiv);

        const innerDiv = document.createElement("div");

        innerDiv.className = "inner-slide";

        if(i === 0){
            innerDiv.classList.add("active");
        }

        innerDiv.style.backgroundImage = `url('${slide.image}')`;

        innerSlider.appendChild(innerDiv);

        innerSlidesElements.push(innerDiv);
    });

    sliderTitle.textContent = slidesData[0].title;
    sliderText.textContent = slidesData[0].text;
}

/* =========================
   CHANGEMENT DES SLIDES
========================= */

const animatedContent =
document.getElementById("animatedContent");

function nextSlide() {

    bgSlidesElements[currentIndex]
    .classList.remove("active");

    innerSlidesElements[currentIndex]
    .classList.remove("active");

    currentIndex =
    (currentIndex + 1) % slidesData.length;

    bgSlidesElements[currentIndex]
    .classList.add("active");

    innerSlidesElements[currentIndex]
    .classList.add("active");

    sliderTitle.textContent =
    slidesData[currentIndex].title;

    sliderText.textContent =
    slidesData[currentIndex].text;

    /* RESET */

    animatedContent.classList.remove(
    "left",
    "right",
    "animate-left",
    "animate-right",
    "animate-bottom-right",
    "animate-bottom-left"
);

    void animatedContent.offsetWidth;

    /* SLIDE 1 */
if(currentIndex === 0){

    animatedContent.classList.add(
        "right",
        "animate-right"
    );
}

/* SLIDE 2 */
else if(currentIndex === 1){

    animatedContent.classList.add(
        "left",
        "animate-left"
    );
}

/* SLIDE 3 */
else if(currentIndex === 2){

    animatedContent.classList.add(
        "right",
        "animate-bottom-right"
    );
}

/* SLIDE 4 */
else{

    animatedContent.classList.add(
        "left",
        "animate-bottom-left"
    );
}
}

/* =========================
   ANIMATION TEXTE
========================= */

function animateText(){

    sliderTitle.style.opacity = "0";
    sliderText.style.opacity = "0";

    sliderTitle.style.transform = "translateY(20px)";
    sliderText.style.transform = "translateY(20px)";

    setTimeout(() => {

        sliderTitle.style.transition = "all 0.6s ease";
        sliderText.style.transition = "all 0.6s ease";

        sliderTitle.style.opacity = "1";
        sliderText.style.opacity = "1";

        sliderTitle.style.transform = "translateY(0)";
        sliderText.style.transform = "translateY(0)";

    }, 100);
}

/* =========================
   DEMARRAGE
========================= */

function startSlider(){

    setInterval(nextSlide, 5000);
}

preloadImages();
</script>

</body>
</html>
