<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>African Queen Empire</title>

<!-- Importation du Style 1 (Royal & Prestige) depuis Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    /* Application de la police épurée Poppins par défaut */
    font-family: 'Poppins', sans-serif;
    overflow:hidden;
    background-color: #000;
}

/* ================= FRONT PAGE / EN-TÊTE ================= */
.front-page{
    position:relative;
    width:100%;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTENEURS POUR LE FLOU ARRIÈRE-PLAN */
.bg-slider {
    position: absolute;
    inset: 0;
    z-index: 1;
}

.bg-slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transform: scale(1.1);
    filter: blur(20px);
    opacity: 0;
    transition: opacity 0.4s linear; 
}

/* Couche sombre globale */
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.5);
    z-index:2;
}

/* ================= CONTENT BOX (CARTE BANNIÈRE) ================= */
.content-box{
    position:relative;
    width: 96vw;
    height: 92vh;
    border-radius: 24px; 
    overflow:hidden;
    z-index:3;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);

    display: flex;
    flex-direction: column;
    justify-content: flex-end; 
}

/* Slider interne (images nettes) */
.inner-slider {
    position: absolute;
    inset: 0;
    z-index: 1;
}

.inner-slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 0.4s linear;
}

/* États actifs */
.bg-slide.active { opacity: 0.5; }
.inner-slide.active { opacity: 1; }

/* Dégradé interne pour la lisibilité du texte */
.content-box::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 100%);
    z-index:2;
}

/* ================= HEADER BAR (LOGO + NAV) ================= */
.header-bar {
    position: absolute;
    top: 40px;
    left: 0;
    right: 0;
    padding: 0 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
}

/* Style Écriture Logo (Playfair Display - Prestige Royal) */
.logo {
    font-family: 'Playfair Display', serif;
    color: white;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* Style de la Navigation (Poppins - Moderne & Épurée) */
.main-nav-container a {
    color: white;
    text-decoration: none;
    margin-left: 35px;
    font-size: 0.95rem;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.75;
    transition: opacity 0.3s;
    display: inline-block;
}

.main-nav-container a:hover {
    opacity: 1;
}

/* ================= TEXTE CENTRAL ET DYNAMIQUE ================= */
.content{
    position:relative;
    z-index:3;
    color:white;
    padding: 0 40px 60px 60px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
}

.content h1{
    /* Application du style signature : Playfair Display en Italique */
    font-family: 'Playfair Display', serif;
    font-size: 5rem;
    font-weight: 400;
    font-style: italic; 
    margin-bottom: 15px;
    line-height: 1.1;
}

.content p {
    font-family: 'Poppins', sans-serif;
    font-size: 1.1rem;
    font-weight: 300;
    max-width: 600px;
    line-height: 1.8;
    opacity: 0.85;
    letter-spacing: 0.5px;
}

/* ==================================================
   RESPONSIVE DESIGN (Adaptation Mobile & Tablette)
   ================================================== */

@media (max-width: 992px) {
    .header-bar {
        padding: 0 40px;
    }
    .content h1 {
        font-size: 3.5rem;
    }
}

@media (max-width: 768px) {
    .header-bar {
        top: 25px;
        flex-direction: column;
        gap: 15px;
        padding: 0 20px;
    }

    .logo {
        font-size: 1.3rem;
        letter-spacing: 1px;
    }

    .main-nav-container a {
        margin: 0 10px;
        font-size: 0.85rem;
        letter-spacing: 1px;
    }

    .content {
        padding: 0 24px 40px 24px;
    }

    .content h1 {
        font-size: 2.4rem;
    }

    .content p {
        font-size: 0.95rem;
    }
}
</style>
</head>
<body>

<section class="front-page">

    <!-- Slider d'arrière-plan (flou) -->
    <div class="bg-slider" id="bgSlider"></div>

    <!-- Overlay de protection -->
    <div class="overlay"></div>

    <!-- Grande Carte En-tête -->
    <div class="content-box">
        
        <!-- Barre d'en-tête (Logo en haut à gauche, Nav à droite) -->
        <div class="header-bar">
            <div class="logo">African Queen Empire</div>
            
            <div class="main-nav-container">
                <a href="#">Services</a>
                <a href="#">Shop</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </div>
        </div>
        
        <!-- Slider central (net) -->
        <div class="inner-slider" id="innerSlider"></div>

        <!-- Texte dynamique -->
        <div class="content">
            <h1 id="sliderTitle">African Queen</h1>
            <p id="sliderText">Handmade Creativity</p>
        </div>
    </div>

</section>

<script>
// Structure de données contenant les visuels en ligne (libres de droits et optimisés) et les textes associés
const slidesData = [
    {
        image: "https://images.unsplash.com/photo-1532375811408-1b694b90f69f?q=80&w=1000&auto=format&fit=crop",
        title: "Handmade Creativity",
        text: "Unique African crafts made with passion and precision."
    },
    {
        image: "https://images.unsplash.com/photo-1605276374104-dee2a0ed3cd6?q=80&w=1000&auto=format&fit=crop",
        title: "Interior Decoration",
        text: "Bring warmth and African elegance into your living spaces."
    },
    {
        image: "https://images.unsplash.com/photo-1501339847302-ac426a4a7cbb?q=80&w=1000&auto=format&fit=crop",
        title: "Café Lifestyle",
        text: "Relax and enjoy an authentic cultural coffee experience."
    },
    {
        image: "https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=1000&auto=format&fit=crop",
        title: "Fashion Products",
        text: "Bold designs and premium African textiles just for you."
    }
];

const bgSlider = document.getElementById("bgSlider");
const innerSlider = document.getElementById("innerSlider");
const sliderTitle = document.getElementById("sliderTitle");
const sliderText = document.getElementById("sliderText");

// Génération des couches d'images superposées
slidesData.forEach((slide, i) => {
    const bgDiv = document.createElement("div");
    bgDiv.className = `bg-slide ${i === 0 ? 'active' : ''}`;
    bgDiv.style.backgroundImage = `url('${slide.image}')`;
    bgSlider.appendChild(bgDiv);

    const innerDiv = document.createElement("div");
    innerDiv.className = `inner-slide ${i === 0 ? 'active' : ''}`;
    innerDiv.style.backgroundImage = `url('${slide.image}')`;
    innerSlider.appendChild(innerDiv);
});

let currentIndex = 0;
const bgSlidesElements = document.querySelectorAll(".bg-slide");
const innerSlidesElements = document.querySelectorAll(".inner-slide");

function nextSlide() {
    bgSlidesElements[currentIndex].classList.remove("active");
    innerSlidesElements[currentIndex].classList.remove("active");

    currentIndex = (currentIndex + 1) % slidesData.length;

    bgSlidesElements[currentIndex].classList.add("active");
    innerSlidesElements[currentIndex].classList.add("active");

    sliderTitle.textContent = slidesData[currentIndex].title;
    sliderText.textContent = slidesData[currentIndex].text;
}

// Initialisation du premier texte
sliderTitle.textContent = slidesData[0].title;
sliderText.textContent = slidesData[0].text;

// Fréquence d'affichage réglée sur 1000ms (1 seconde)
setInterval(nextSlide, 2000);
</script>

</body>
</html>
